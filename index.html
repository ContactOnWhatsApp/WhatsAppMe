<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Group</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;overflow:hidden;color:white}
.bg-video{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2;transition:opacity .5s ease;}
body::after{content:"";position:fixed;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:-1;}
.whatsapp-header{display:flex;align-items:center;padding:10px;background:rgba(0,0,0,.2);}
.blur-content{text-align:center;margin-top:90px}
.stats{display:flex;justify-content:center;gap:50px;margin:15px 0;}
.number{font-size:20px;font-weight:bold}
.fa-circle{color:#00ff6a;font-size:8px;animation:blink 1s infinite;}
@keyframes blink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.sticky-buttons{position:fixed;bottom:40px;width:100%;display:flex;flex-direction:column;align-items:center;}
button{min-width:200px;padding:10px;border:none;border-radius:50px;margin:6px;color:white;font-size:14px;cursor:pointer;}
button i{margin-right:8px;}
.join-button{background:#25D366}
.tiktok-button{background:#000}
.telegram-button{background:#0088cc}
.exit-button{background:#ff2d2d}
button{animation:wave 2s infinite;}
@keyframes wave{0%{transform:translateY(0)}50%{transform:translateY(-5px)}100%{transform:translateY(0)}}

/* ICON ANIMATION */
button i{animation:iconPop 1.5s infinite;display:inline-block;}
@keyframes iconPop{
0%{transform:scale(1) rotate(0deg);}
30%{transform:scale(1.2) rotate(-10deg);}
60%{transform:scale(1.2) rotate(10deg);}
100%{transform:scale(1) rotate(0deg);}
}

/* CHAT */
.chat-container{position:fixed;left:10px;bottom:300px;}
.chat-bubble{display:flex;gap:6px;background:rgba(255,255,255,.25);color:#111;padding:6px 8px;border-radius:12px;margin:4px;font-size:11px;backdrop-filter:blur(4px);animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-avatar{width:22px;height:22px;border-radius:50%;}

/* EMOJI */
.float-container{position:fixed;right:10px;bottom:100px;pointer-events:none;}
.float-item{position:absolute;animation:floatUp 3s linear forwards;}
@keyframes floatUp{0%{transform:translateY(0);opacity:0;}10%{opacity:1;}100%{transform:translateY(-280px);opacity:0;}}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop id="bgVideo"></video>

<div class="whatsapp-header">

<div class="stats">
<div>

</div>
<div>

</div>
</div>

<div>👁 <b><span id="viewer">1287</span></b> watching</div>
</div>

<div class="sticky-buttons">
<button class="join-button" onclick="openLink('https://cjfdccd.pathflirt.com/p/HYug1')">
<i class="fab fa-whatsapp"></i> WhatsApp
</button>

<button class="tiktok-button" onclick="openLink('https://cjfdccd.pathflirt.com/p/HYug1')">

</button>

<button class="telegram-button" onclick="openLink('https://cjfdccd.pathflirt.com/p/HYug1')">
<i class="fab fa-telegram"></i> Telegram
</button>

<button class="exit-button" onclick="window.location.replace('https://cjfdccd.pathflirt.com/p/HYug1')">

</div>

<div class="chat-container" id="chatContainer"></div>
<div class="float-container" id="floatContainer"></div>

</body>
</html>
